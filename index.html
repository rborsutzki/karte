<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzahütte by BENACO · Tollwood 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap');
:root{--bg:#2a2218;--bg2:#1e1a12;--bg3:#221c10;--gold:#c8a050;--warm:#f0e0c0;--price:#f0d080;--muted:#9a8870;--tv:#4a7c4e;--tg:#6a7c4e;--acc:#3a2e1e;--bd:#2e2819;--bd2:#3a3020;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--warm);font-family:'Inter',sans-serif;font-weight:300;min-height:100vh;padding-bottom:4rem;max-width:600px;margin:0 auto;}

/* HEADER */
header{background:var(--bg2);border-bottom:1px solid var(--gold);padding:.9rem 1.2rem .8rem;text-align:center;position:sticky;top:0;z-index:100;}
.ph{font-family:Impact,'Arial Black',sans-serif;font-size:1.8rem;color:#d63c2a;letter-spacing:.08em;text-transform:uppercase;line-height:1;}
.by{font-size:.55rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin:.15rem 0 .1rem;}
.wm-row{display:flex;align-items:baseline;justify-content:center;gap:.5rem;}
.wm{font-family:'Cormorant Garamond',serif;font-size:1.4rem;letter-spacing:.28em;color:var(--gold);font-weight:600;}
.wm-sub{font-size:.62rem;color:var(--muted);letter-spacing:.12em;}

/* FLASH SALE */
#flash{display:none;background:#c8320a;padding:.6rem 1.2rem;border-bottom:2px solid #ff6040;}
.flash-inner{display:flex;align-items:center;justify-content:space-between;}
.flash-label{font-size:.52rem;color:#ffcfc0;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.1rem;}
.flash-name{font-size:.95rem;font-weight:500;color:#fff;}
.flash-prices{text-align:right;}
.flash-old{font-size:.68rem;color:#ffcfc0;text-decoration:line-through;}
.flash-new{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:#fff;}
.flash-until{font-size:.55rem;color:#ffcfc0;margin-top:.1rem;}

/* NAV */
nav{background:var(--bg2);display:flex;border-bottom:1px solid var(--bd2);overflow-x:auto;scrollbar-width:none;}
nav::-webkit-scrollbar{display:none;}
nav button{flex:0 0 auto;padding:.65rem .7rem;font-size:.62rem;letter-spacing:.08em;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;}
nav button.active{color:var(--gold);border-bottom-color:var(--gold);}

.motto{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.78rem;color:var(--muted);padding:.75rem 1.2rem;border-bottom:1px solid var(--bd2);}
.sec{padding:1.2rem 1.2rem .5rem;}
.sec-t{font-family:'Cormorant Garamond',serif;font-size:.7rem;letter-spacing:.32em;color:var(--gold);text-transform:uppercase;font-weight:600;border-bottom:1px solid var(--bd2);padding-bottom:.35rem;margin-bottom:.7rem;}
.item{display:flex;justify-content:space-between;align-items:flex-start;padding:.6rem 0;border-bottom:1px solid var(--bd);gap:.8rem;}
.item:last-child{border-bottom:none;}
.il{flex:1;}
.nr{display:flex;align-items:baseline;gap:.35rem;flex-wrap:wrap;margin-bottom:.15rem;}
.n{font-size:.93rem;font-weight:400;color:var(--warm);}
.d{font-size:.68rem;color:var(--muted);line-height:1.45;}
.dt{font-size:.62rem;color:#7a6a52;line-height:1.4;font-style:italic;margin-top:.12rem;}
.al{font-size:.6rem;color:#7a6a52;letter-spacing:.04em;}
.p{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--price);font-weight:600;white-space:nowrap;text-align:right;min-width:55px;}
.tag{font-size:.5rem;font-weight:500;letter-spacing:.05em;padding:.1rem .28rem;border-radius:2px;text-transform:lowercase;}
.tv{background:#4a7c4e;color:#d0f0d0;}
.tg{background:#6a7c4e;color:#d8f0c0;}
.taf{background:#2a3a4a;color:#a0c0d0;}
.tt{background:#4a3a10;color:var(--gold);border:1px solid var(--gold);}
.kalt{font-size:.58rem;color:#7ab0c8;margin-bottom:.05rem;display:block;}
.hl{background:var(--bg3);border-top:1px solid var(--gold);border-bottom:1px solid var(--gold);margin:.3rem 0;}
.ext{margin:.4rem 1.2rem;padding:.55rem .8rem;background:var(--acc);border-left:2px solid var(--gold);font-size:.66rem;color:var(--muted);line-height:1.7;}
.ext strong{color:var(--warm);}
.kg{display:flex;flex-wrap:wrap;gap:.3rem;margin:.3rem 0 .5rem;}
.kt{background:var(--acc);border:1px solid #4a3a28;padding:.25rem .5rem;font-size:.7rem;color:var(--warm);border-radius:2px;}
.kp{display:flex;gap:2rem;margin-top:.2rem;justify-content:center;}
.kpi{display:flex;flex-direction:column;}
.kpl{font-size:.62rem;color:var(--muted);}
.kpv{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--price);font-weight:600;}
footer{margin:1.2rem 1.2rem 0;padding-top:.8rem;border-top:1px solid var(--bd2);font-size:.6rem;color:var(--muted);line-height:1.9;}
footer strong{color:var(--warm);}
.fn{margin-top:.3rem;color:#5a4a32;font-size:.56rem;}
</style>
</head>

function fmt(p){return p.toFixed(2).replace('.',',')+' €';}

function tagH(typ){
  if(typ==='vegan') return '<span class="tag tv">vegan</span>';
  if(typ==='veggi') return '<span class="tag tg">veggi</span>';
  if(typ==='tages') return '<span class="tag tt">heute</span>';
  return '';
}

function renderItem(r){
  return `<div class="item">
    <div class="il">
      ${r.typ==='kalt'?'<span class="kalt">❄ kalt serviert</span>':''}
      <div class="nr">
        ${tagH(r.typ)}
        <span class="n">${r.n}</span>
        ${r.a?`<span class="al">${r.a}</span>`:''}
        ${r.typ==='af'?'<span class="tag taf">alkoholfrei</span>':''}
      </div>
      ${r.d?`<div class="d">${r.d}</div>`:''}
      ${r.dt?`<div class="dt">${r.dt}</div>`:''}
    </div>
    <div class="p">${fmt(r.p)}</div>
  </div>`;
}

function renderTab(k){
  const items=DATA.filter(r=>r.k===k);
  if(!items.length) return '';
  if(k==='KURZE'){
    return `<div class="sec">
      <div class="sec-t">Kurze · 2 cl / 4 cl</div>
      <div class="kg">${items.map(r=>`<span class="kt">${r.n}</span>`).join('')}</div>
      <div class="kp">
        <div class="kpi"><span class="kpl">2 cl</span><span class="kpv">3,50 €</span></div>
        <div class="kpi"><span class="kpl">4 cl</span><span class="kpv">6,50 €</span></div>
      </div>
    </div>`;
  }
  if(k==='PIZZA'){
    const normal=items.filter(r=>!r.bes);
    const bes=items.filter(r=>r.bes);
    return `
      <div class="sec"><div class="sec-t">Alle Pizzen</div>${normal.map(renderItem).join('')}</div>
      ${bes.length?`<div class="hl"><div class="sec" style="padding-bottom:.8rem">
        <div class="sec-t" style="margin-top:.3rem">Besondere</div>
        ${bes.map(renderItem).join('')}
      </div></div>`:''}
      <div class="ext"><strong>Extras:</strong> Standard +1 € · Knoblauch +1,50 € · Gemüse +1,50 € · Parmesan +2 € · Salami scharf +2 € · Speck +2 € · Gorgonzola +2 €</div>`;
  }
  const label=TABS.find(t=>t.k===k)?.l||k;
  return `<div class="sec"><div class="sec-t">${label}</div>${items.map(renderItem).join('')}</div>`;
}

}

function buildNav(){
  document.getElementById('nav').innerHTML=TABS.map(t=>
    `<button onclick="go('${t.k}')" id="t-${t.k}" class="${t.k===active?'active':''}">${t.l}</button>`
  ).join('');
}

function initFlash(){
  const el=document.getElementById('flash');
  if(FLASH.aktiv){
    document.getElementById('flash-name').textContent=FLASH.name;
    document.getElementById('flash-old').textContent=FLASH.preisAlt;
    document.getElementById('flash-new').textContent=FLASH.preisNeu;
    document.getElementById('flash-until').textContent='bis '+FLASH.bis;
    el.style.display='block';
  }
}

function go(k){
  active=k;
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('t-'+k);
  if(btn){btn.classList.add('active');btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});}
  document.getElementById('content').innerHTML=renderTab(k)+footer();
  window.scrollTo({top:0,behavior:'smooth'});
}
